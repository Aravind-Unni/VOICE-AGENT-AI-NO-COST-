<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zendesk LiveKit Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; max-width: 500px; margin: 0 auto; background: #1e1e1e; color: white;}
        .container { background: #2d2d2d; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center;}
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s;}
        button:disabled { background: #555; cursor: not-allowed; }
        #disconnectBtn { background: #dc3545; display: none; margin-left: 10px;}
        .status { margin-top: 20px; font-weight: bold; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>Voice Agent Tester</h2>
    <p>Click below to securely fetch the token and connect.</p>
    
    <div style="margin-top: 20px;">
        <button id="connectBtn">Connect & Speak</button>
        <button id="disconnectBtn">Disconnect</button>
    </div>

    <div class="status" id="statusText">🔴 Disconnected</div>
    <audio id="remoteAudio" autoplay></audio>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusText = document.getElementById('statusText');
    const remoteAudio = document.getElementById('remoteAudio');

    const room = new LivekitClient.Room();

    connectBtn.onclick = async () => {
        try {
            statusText.innerText = "⏳ Fetching secure token...";
            connectBtn.disabled = true;

            // 1. Securely ask the Python backend for the URL and Token
            const response = await fetch('/get_token');
            const authData = await response.json();

            statusText.innerText = "⏳ Connecting to LiveKit...";

            // 2. Connect to the LiveKit Room
            await room.connect(authData.url, authData.token);
            
            // 3. Turn on the user's microphone
            await room.localParticipant.setMicrophoneEnabled(true);

            // 4. Listen for the AI Agent
            room.on(LivekitClient.RoomEvent.TrackSubscribed, (track) => {
                if (track.kind === 'audio') {
                    track.attach(remoteAudio);
                }
            });

            statusText.innerText = "🟢 Connected! Start speaking.";
            connectBtn.style.display = 'none';
            disconnectBtn.style.display = 'inline-block';
            disconnectBtn.disabled = false;

        } catch (error) {
            console.error(error);
            statusText.innerText = "❌ Connection Failed.";
            connectBtn.disabled = false;
        }
    };

    disconnectBtn.onclick = () => {
        room.disconnect();
        statusText.innerText = "🔴 Disconnected";
        connectBtn.style.display = 'inline-block';
        connectBtn.disabled = false;
        disconnectBtn.style.display = 'none';
    };
</script>

</body>
</html>
